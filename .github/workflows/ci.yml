name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: eleve
          POSTGRES_PASSWORD: eleve
          POSTGRES_DB: eleve
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eleve -d eleve"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://eleve:eleve@localhost:5432/eleve?schema=public
      DIRECT_URL: postgresql://eleve:eleve@localhost:5432/eleve?schema=public
      AUTH_SECRET: ci-test-auth-secret-minimum-32-characters-long
      ADMIN_PASSWORD: ci-admin-password-12345
      E2E_ADMIN_PASSWORD: ci-admin-password-12345

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npx prisma migrate deploy

      - run: npm run db:seed

      - run: npm run lint

      - run: npx tsc --noEmit

      - run: npm run verify:truth

      - run: npm run build

      - run: npx playwright install --with-deps chromium

      - run: npm run test:e2e

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
